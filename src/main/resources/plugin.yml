name: GraftingPlugin
version: ${version}
main: com.graftingplugin.GraftingPlugin
api-version: '1.21'
description: Lean grafting mechanics for Paper.
authors:
  - Optuber
commands:
  graft:
    description: Core grafting command.
    usage: /graft <help|mode|concept [list|<name>]|inventory|inv|target|aspect|next|cycle|self|inspect|clear|active|debug|status|clearactive|givefocus|reload>
    permission: grafting.use
permissions:
  grafting.use:
    default: true
  grafting.admin:
    default: op
    children:
      grafting.use: true
