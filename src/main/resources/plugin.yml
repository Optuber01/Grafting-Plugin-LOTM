name: GraftingPlugin
version: ${version}
main: com.graftingplugin.GraftingPlugin
api-version: '1.21'
description: Aspect-based universal grafting for Paper.
authors:
  - Optuber
commands:
  graft:
    description: Core grafting command.
    usage: /graft <mode|concept|aspect|inspect|clear|active|status|clearactive|givefocus|reload>
permissions:
  grafting.use:
    default: true
  grafting.admin:
    default: op
